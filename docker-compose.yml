version: "3.9"

services:
  ai-flow-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-flow-enterprise
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/aiflow_enterprise_dev}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      FRAUD_ML_SERVICE_URL: ${FRAUD_ML_SERVICE_URL:-http://fraud-ml-service:8000}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - aiflow-network

  mongodb:
    image: mongo:7-jammy
    container_name: aiflow-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: aiflow_enterprise_dev
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - aiflow-network

  fraud-ml-service:
    build:
      context: ./fraud-ml-service
      dockerfile: Dockerfile
    container_name: aiflow-fraud-ml
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - aiflow-network

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: aiflow-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aiflow-network

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local

networks:
  aiflow-network:
    driver: bridge
